version: "3.9"

services:
  postgres_test:
    image: postgres:15
    container_name: postgres_test
    restart: always
    env_file:
      - .env.test
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data

